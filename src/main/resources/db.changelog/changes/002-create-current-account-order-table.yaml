databaseChangeLog:
  - changeSet:
      id: 002-create-current-account-order-table
      author: Turan
      changes:
        - createTable:
            tableName: current_account_order
            columns:
              - column:
                  name: id
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: account_type
                  type: VARCHAR(50)

              - column:
                  name: currency
                  type: VARCHAR(10)

              - column:
                  name: status
                  type: VARCHAR(50)

              - column:
                  name: customer_id
                  type: BIGINT

              - column:
                  name: reject_reason
                  type: text

              - column:
                  name: description
                  type: text

              - column:
                  name: current_account_id
                  type: BIGINT

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: current_account_order
            baseColumnNames: current_account_id
            referencedTableName: current_account
            referencedColumnNames: id
            constraintName: fk_current_account_order_account