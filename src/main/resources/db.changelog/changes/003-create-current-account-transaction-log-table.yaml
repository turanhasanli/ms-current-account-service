databaseChangeLog:
  - changeSet:
      id: 003-create-current-account-transaction-log
      author: Turan
      changes:
        - createTable:
            tableName: current_account_transaction_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: old_balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: new_balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_date
                  type: DATE
                  defaultValueComputed: CURRENT_DATE
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: BIGINT
                  constraints:
                    nullable: true